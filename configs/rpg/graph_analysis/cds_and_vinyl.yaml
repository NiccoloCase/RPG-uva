run_id: rpg_graph_analysis_cds_and_vinyl

# Shared checkpoint/tokenizer reconstruction for the CDs stress test.
category: CDs_and_Vinyl
metadata: sentence
n_codebook: 64

# Static graph-analysis controls.
# CDs uses the released README graph width n_edges=500, so we prepare one exact
# flat top-500 graph and slice it for smaller static budgets.
graph_backend: flat
graph_topk: 500
graph_vector_batch_size: 512
graph_analysis_output_dir: artifacts/rpg/graph_analysis/cds_and_vinyl
graph_analysis_k_values: [50, 100, 200, 500]
graph_analysis_random_seeds: [2024, 2025, 2026]
graph_analysis_similarity_batch_size: 32768

# Dynamic/query-conditioned controls for later commands. They are intentionally
# not used by the static command, but document the README CDs inference setting.
# temperature: 0.03
# num_beams: 20
# n_edges: 500
# propagation_steps: 5
