run_id: rpg_graph_analysis_cds_and_vinyl_perf_inference

# Performance-only benchmark: time upstream graph generation against vectorized
# all-item RPG token scoring. This intentionally avoids tracing visited sets.
temperature: 0.03
num_beams: 20
n_edges: 500
propagation_steps: 5

# Keep this focused and comparable to the CDs C sweep without rerunning every
# intermediate width. This measures no-trace runtime, not traced C latency.
graph_analysis_scoring_n_edges: [50, 200, 500]
graph_analysis_eval_seeds: [2024]
graph_analysis_perf_include_bruteforce: true

# Match the existing performance-profiling methodology.
graph_analysis_perf_repeats: 3
graph_analysis_perf_warmup_batches: 2
graph_analysis_perf_measure_cuda_memory: true
