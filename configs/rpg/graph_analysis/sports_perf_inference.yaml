run_id: rpg_graph_analysis_sports_perf_inference

# Performance-only benchmark: time upstream graph generation against vectorized
# all-item RPG token scoring. This intentionally avoids tracing visited sets.
temperature: 0.03
num_beams: 100
n_edges: 30
propagation_steps: 5

# Keep this focused and cheap: one full-test seed over the graph widths needed
# to compare the production-style cost of graph decoding and brute force.
graph_analysis_scoring_n_edges: [10, 30, 100]
graph_analysis_eval_seeds: [2024]
graph_analysis_perf_include_bruteforce: true

# Match the existing performance-profiling methodology, while keeping the
# graph-analysis hparams above unchanged.
graph_analysis_perf_repeats: 3
graph_analysis_perf_warmup_batches: 2
graph_analysis_perf_measure_cuda_memory: true
