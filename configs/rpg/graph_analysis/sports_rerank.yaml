run_id: rpg_graph_analysis_sports_rerank

# Lightweight intervention test: reduce traversal cost, then rerank the visited
# candidates with a direct user/item score. These are README Sports inference
# defaults except for the intentionally shorter propagation depth.
temperature: 0.03
num_beams: 100
n_edges: 50
propagation_steps: 3

# First reranking run: one graph budget, one depth, one eval seed.
graph_analysis_rerank_n_edges: [50]
graph_analysis_rerank_propagation_steps: [3]
graph_analysis_eval_seeds: [2024]

# Numeric pools are selected by the original RPG token score before applying
# the hybrid reranker. "all" reranks the full visited set.
graph_analysis_rerank_pool_sizes: [500]
graph_analysis_rerank_hybrid_alphas: [0.8, 0.9]

# Quick proof-of-concept run. Remove this limit for the full test set.
graph_analysis_rerank_max_users: 2000

# Compare context-based traced decoding against upstream generate() on the
# first batch of every run. Set to 0 only after the reranker path is trusted.
graph_analysis_trace_parity_batches: 1
