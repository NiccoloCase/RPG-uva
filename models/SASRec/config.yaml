# Common SASRec architecture and model-behavior defaults.
# Dataset- and run-specific settings live under configs/sasrec/.

# Sequence length
max_item_seq_len: 50

# RecBole-style SASRec architecture
hidden_size: 64
inner_size: 256
n_layers: 2
n_heads: 2
hidden_dropout_prob: 0.5
attn_dropout_prob: 0.5
hidden_act: gelu
layer_norm_eps: 1e-12
initializer_range: 0.02

# Training objective for the current implementation
loss_type: CE
