# SASRec architecture defaults from CIKM2020-S3Rec.
hidden_size: 64
num_hidden_layers: 2
num_attention_heads: 2
hidden_act: gelu
attention_probs_dropout_prob: 0.5
hidden_dropout_prob: 0.5
initializer_range: 0.02
max_seq_length: 50

# Training defaults.
lr: 0.001
train_batch_size: 256
eval_batch_size: 256
epochs: 200
weight_decay: 0.0
adam_beta1: 0.9
adam_beta2: 0.999
seed: 42
log_freq: 1
patience: 10
topk: [5, 10, 20]
val_metric: ndcg@20
full_sort: true
no_cuda: false

# Preprocessing defaults shared by SASRec reproduction jobs.
rating_score: 0.0
user_core: 5
item_core: 5
